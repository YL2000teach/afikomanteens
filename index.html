<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>חפש את האפיקומן 🫓</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #b45309; --cream: #fdf6ec; --cream2: #f5ede0;
  --brown: #2d1a0e; --brown2: #6b4226; --purple: #7c3aed; --purple2: #6d28d9;
  --green: #15803d; --border: #e0ccb0; --shadow: rgba(45,26,14,0.13);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Heebo', sans-serif; background: var(--cream); min-height: 100vh; color: var(--brown); }
body::before {
  content: ''; position: fixed; inset: 0;
  background: radial-gradient(ellipse at 10% 20%, rgba(180,83,9,0.07) 0%, transparent 60%),
              radial-gradient(ellipse at 90% 80%, rgba(124,58,237,0.06) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}
.screen { display: none; position: relative; z-index: 1; }
.screen.active { display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
#screen-home { justify-content: center; padding: 24px 20px 36px; gap: 20px; }
.home-header { text-align: center; }
.home-title { font-size: 1.9rem; font-weight: 900; color: var(--gold); letter-spacing: -1px; }
.home-sub { font-size: 0.95rem; color: var(--brown2); font-weight: 700; margin-top: 4px; }
.home-card { width: 100%; max-width: 360px; background: #fff; border: 2px solid var(--border); border-radius: 20px; padding: 20px 22px; box-shadow: 0 6px 28px var(--shadow); display: flex; flex-direction: column; gap: 14px; }
.card-label { font-size: 0.82rem; font-weight: 700; color: var(--gold); text-align: center; }
.code-input { font-family: 'Heebo', sans-serif; font-size: 1.8rem; font-weight: 900; width: 100%; height: 62px; border: 2.5px solid var(--border); border-radius: 12px; padding: 0 16px; outline: none; text-align: center; background: var(--cream); color: var(--brown); letter-spacing: 5px; transition: border-color 0.15s, box-shadow 0.15s; direction: ltr; }
.code-input:focus { border-color: var(--purple); box-shadow: 0 0 0 3px rgba(124,58,237,0.15); }
.code-input.wrong { border-color: #dc2626; background: #fef2f2; animation: shake 0.3s ease; }
.code-feedback { font-size: 0.88rem; font-weight: 700; min-height: 18px; text-align: center; color: #dc2626; }
.btn-enter { font-family: 'Heebo', sans-serif; font-weight: 700; font-size: 1.05rem; padding: 13px; border-radius: 12px; border: none; background: var(--purple); color: #fff; cursor: pointer; transition: background 0.15s, transform 0.1s; }
.btn-enter:hover { background: var(--purple2); transform: translateY(-2px); }
.progress-section { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 8px; }
.progress-header { display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; font-weight: 700; color: var(--brown2); }
.progress-bar-bg { background: #e8d8c0; border-radius: 99px; height: 12px; overflow: hidden; border: 1.5px solid #d4b896; }
.progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--gold), #f59e0b); border-radius: 99px; transition: width 0.7s cubic-bezier(.4,0,.2,1); }
.progress-stations { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }
.station-dot { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border); background: #fff; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 900; color: #b39070; transition: background 0.3s, border-color 0.3s; }
.station-dot.done { background: var(--green); border-color: var(--green); color: #fff; }
.btn-reset-all { font-family: 'Heebo', sans-serif; font-weight: 700; font-size: 0.8rem; padding: 7px 18px; border-radius: 99px; border: 2px solid var(--border); background: transparent; color: #b39070; cursor: pointer; transition: background 0.15s, color 0.15s; }
.btn-reset-all:hover { background: var(--cream2); color: var(--brown2); }
#success-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(15,10,5,0.55); align-items: center; justify-content: center; animation: fadeIn 0.2s ease; }
#success-overlay.show { display: flex; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.success-card { background: #fff; border: 3px solid #86efac; border-radius: 24px; padding: 40px 32px; max-width: 340px; width: 90%; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 12px; animation: popUp 0.35s cubic-bezier(.175,.885,.32,1.275); }
@keyframes popUp { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.success-emoji { font-size: 3.5rem; }
.success-title { font-size: 1.7rem; font-weight: 900; color: var(--green); }
.success-sub { font-size: 0.95rem; color: var(--brown2); line-height: 1.5; }
#win-overlay { display: none; position: fixed; inset: 0; z-index: 300; background: rgba(15,10,5,0.7); align-items: center; justify-content: center; }
#win-overlay.show { display: flex; }
.win-card { background: #fff; border: 3px solid var(--gold); border-radius: 28px; padding: 48px 36px; max-width: 360px; width: 90%; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 14px; animation: popUp 0.4s cubic-bezier(.175,.885,.32,1.275); }
.win-emoji { font-size: 4rem; }
.win-title { font-size: 2rem; font-weight: 900; color: var(--gold); }
.win-text { font-size: 1rem; color: var(--brown2); line-height: 1.6; }
.btn-win { font-family: 'Heebo', sans-serif; font-weight: 700; font-size: 1rem; padding: 12px 28px; border-radius: 12px; border: none; background: var(--gold); color: #fff; cursor: pointer; }
.btn-win:hover { background: #92400e; }
#screen-puzzle { padding: 0; gap: 0; }
.puzzle-topbar { width: 100%; background: #fff; border-bottom: 2px solid var(--border); padding: 6px 10px; display: flex; align-items: center; gap: 8px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px var(--shadow); flex-shrink: 0; }
.topbar-label { font-size: 0.78rem; font-weight: 900; color: var(--gold); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
.btn-back { font-family: 'Heebo', sans-serif; font-weight: 700; font-size: 0.78rem; padding: 5px 10px; border-radius: 8px; border: 2px solid var(--border); background: transparent; color: var(--brown2); cursor: pointer; white-space: nowrap; flex-shrink: 0; }
.btn-back:hover { background: var(--cream2); }
#puzzle-iframe { width: 100%; border: none; min-height: calc(100vh - 46px); flex: 1; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
</style>
</head>
<body>

<div id="screen-home" class="screen active">
  <div class="home-header">
    <div class="home-title">🫓 האפיקומן</div>
    <div class="home-sub">הכניסו את קוד התחנה שמצאתם</div>
  </div>
  <div class="home-card">
    <div class="card-label">קוד תחנה</div>
    <input type="text" class="code-input" id="code-input"
      placeholder="- - - - - -" inputmode="numeric" autocomplete="off" autocorrect="off" spellcheck="false" maxlength="8"/>
    <div class="code-feedback" id="code-feedback"></div>
    <button class="btn-enter" onclick="checkCode()">כניסה ◀</button>
  </div>
  <div class="progress-section">
    <div class="progress-header">
      <span>התקדמות</span>
      <span id="progress-count">0 / 10</span>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="progress-stations" id="progress-stations"></div>
  </div>
  <button class="btn-reset-all" onclick="resetAll()">↺ איפוס התקדמות</button>
  <div style="width:100%;text-align:left;font-size:0.72rem;color:#b39070;padding:0 4px;margin-top:4px;">פיתוח: <a href="mailto:yamit@yam-data.com" style="color:#b39070;">yamit@yam-data.com</a></div>
</div>

<div id="screen-puzzle" class="screen">
  <div class="puzzle-topbar">
    <button class="btn-back" onclick="goHome()">← חזרה</button>
    <div class="topbar-label" id="topbar-label"></div>
    <div style="width:50px"></div>
  </div>
  <iframe id="puzzle-iframe" title="חידה"></iframe>
</div>

<div id="success-overlay">
  <div class="success-card">
    <div class="success-emoji">🎉</div>
    <div class="success-title">כל הכבוד!</div>
    <div class="success-sub">התחנה הושלמה!</div>
  </div>
</div>

<div id="win-overlay">
  <div class="win-card">
    <div class="win-emoji">🏆</div>
    <div class="win-title">מצאתם את האפיקומן!</div>
    <div class="win-text">🎉 כל הכבוד! כל התחנות הושלמו!<br><br>חג פסח שמח! 🌿</div>
    <button class="btn-win" onclick="document.getElementById('win-overlay').classList.remove('show')">🫓 סיום</button>
  </div>
</div>

<script>
const STATIONS = [
  { id:1,  name:'תחנה 1',  icon:'🖼️', code:'1357' },
  { id:2,  name:'תחנה 2',  icon:'🔤', code:'2489' },
  { id:3,  name:'תחנה 3',  icon:'🖼️', code:'9876' },
  { id:4,  name:'תחנה 4',  icon:'🫓', code:'1982' },
  { id:5,  name:'תחנה 5',  icon:'🔗', code:'2026' },
  { id:6,  name:'תחנה 6',  icon:'🖼️', code:'1493' },
  { id:7,  name:'תחנה 7',  icon:'📝', code:'1234' },
  { id:8,  name:'תחנה 8',  icon:'👦', code:'4334' },
  { id:9,  name:'תחנה 9',  icon:'🖼️', code:'2222' },
  { id:10, name:'תחנה 10', icon:'🔺', code:'1470' },
];

const STORAGE_KEY = 'afikoman_adults_v1';
let state = { completed: [] };
let currentStation = null;

function loadState() { try { const r = localStorage.getItem(STORAGE_KEY); if (r) state = JSON.parse(r); } catch(e) {} }
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function isCompleted(id) { return state.completed.includes(id); }
function markCompleted(id) { if (!isCompleted(id)) { state.completed.push(id); saveState(); } }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  window.scrollTo(0, 0);
}

function goHome() {
  showScreen('home');
  renderProgress();
  const inp = document.getElementById('code-input');
  inp.value = ''; inp.className = 'code-input';
  document.getElementById('code-feedback').textContent = '';
  setTimeout(() => inp.focus(), 150);
}

document.getElementById('code-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkCode(); });
document.getElementById('code-input').addEventListener('input', () => {
  document.getElementById('code-input').className = 'code-input';
  document.getElementById('code-feedback').textContent = '';
});

function checkCode() {
  const inp = document.getElementById('code-input');
  const val = inp.value.trim();
  const fb = document.getElementById('code-feedback');
  if (!val) { fb.textContent = 'הכניסו קוד'; return; }
  const st = STATIONS.find(s => s.code === val);
  if (!st) {
    inp.className = 'code-input wrong';
    setTimeout(() => inp.className = 'code-input', 320);
    fb.textContent = 'קוד לא נכון — נסו שוב 🔍';
    inp.value = '';
    setTimeout(() => inp.focus(), 100);
    return;
  }
  currentStation = st;
  launchPuzzle();
}

function launchPuzzle() {
  document.getElementById('topbar-label').textContent = `${currentStation.icon} תחנה ${currentStation.id}`;
  const iframe = document.getElementById('puzzle-iframe');
  const b64 = STATION_DATA[currentStation.id];
  const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const html = new TextDecoder('utf-8').decode(bytes);
  iframe.srcdoc = html;
  showScreen('puzzle');
}

window.addEventListener('message', e => {
  if (e.data && e.data.type === 'STATION_COMPLETE') handleCompletion();
});

function handleCompletion() {
  markCompleted(currentStation.id);
  renderProgress();
  document.getElementById('success-overlay').classList.add('show');
  setTimeout(() => {
    document.getElementById('success-overlay').classList.remove('show');
    goHome();
    if (state.completed.length === STATIONS.length) {
      setTimeout(() => document.getElementById('win-overlay').classList.add('show'), 400);
    }
  }, 2200);
}

function renderProgress() {
  const n = state.completed.length;
  document.getElementById('progress-fill').style.width = Math.round(n / STATIONS.length * 100) + '%';
  document.getElementById('progress-count').textContent = n + ' / ' + STATIONS.length;
  const container = document.getElementById('progress-stations');
  container.innerHTML = '';
  STATIONS.forEach(st => {
    const dot = document.createElement('div');
    dot.className = 'station-dot' + (isCompleted(st.id) ? ' done' : '');
    dot.textContent = isCompleted(st.id) ? '✓' : st.id;
    container.appendChild(dot);
  });
}

function resetAll() {
  state = { completed: [] };
  saveState();
  renderProgress();
}
